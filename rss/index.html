            <h2 id="rss-shi-shen-me">RSS 是什么？</h2>
<p>RSS（Really Simple Syndication）是一种内容聚合技术，你可以通过 RSS 阅读器订阅博客更新，无需手动访问网站。</p>
<h2 id="ru-he-ding-yue">如何订阅？</h2>
<h3 id="di-yi-bu-gen-ju-ni-de-she-bei-xuan-ze-yue-du-qi">第一步：根据你的设备选择阅读器</h3>
<p>在搜索引擎中检索适用于你当前平台的阅读器。</p>
<h3 id="di-er-bu-tian-jia-ding-yue-yuan">第二步：添加订阅源</h3>
<p>点击下方按钮复制订阅地址，在 RSS 阅读器中添加即可。</p>
<button onclick="var i=document.createElement('input');i.value=window.location.origin+'/rss.xml';document.body.appendChild(i);i.select();document.execCommand('copy');i.remove();this.textContent='✓ 已复制';setTimeout(()=>this.textContent='点击复制 RSS 地址',2000)" style="font-size:1rem;padding:8px 18px;border:1px solid var(--accent);background:none;color:var(--accent);cursor:pointer;border-radius:4px;margin:10px 0;">
  点击复制 RSS 地址
</button>

<script>
(function() {
    var start = new Date('2026-06-23T00:00:00');
    var el = document.getElementById('running-time');
    function tick() {
        var diff = Date.now() - start;
        var d = Math.floor(diff / 864e5);
        var h = Math.floor((diff % 864e5) / 36e5);
        var m = Math.floor((diff % 36e5) / 6e4);
        var s = Math.floor((diff % 6e4) / 1e3);
        el.textContent = '\u5df2\u8fd0\u884c ' + d + ' \u5929 ' + h + ' \u5c0f\u65f6 ' + m + ' \u5206 ' + s + ' \u79d2';
    }
    if (el) { tick(); setInterval(tick, 1000); }
})();

document.addEventListener('DOMContentLoaded', function() {

        var text = el.textContent.trim();
        if (text.length > 100) {
            el.textContent = text.substring(0, 100) + '...';
        }
    });
});
